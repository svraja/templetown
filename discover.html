  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      padding-top: 80px;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      font-size: 16px;
    }

    .distance {
      color: red;
      font-weight: bold;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    .box {
      width: 48%;
      border: 1px solid #ffc4c4;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
	  margin-right: 5px;
    }

    .small {
      font-size: 11px;
      color: #555;
    }
	
	/* Slider */
	.slider {
	  position: relative;
	  width: 90%;
	  margin: 20px auto;
	  overflow: hidden;
	  border-radius: 20px;
	}

	.slides {
	  display: flex;
	  transition: transform 0.5s ease-in-out;
	}

	.slides img {
	  width: 100%;
	  flex-shrink: 0;
	}

	/* Buttons */
	.btn {
	  position: absolute;
	  top: 50%;
	  transform: translateY(-50%);
	  background: rgba(0,0,0,0.5);
	  color: white;
	  border: none;
	  padding: 10px;
	  cursor: pointer;
	  border-radius: 50%;
	}

	.prev { left: 10px; }
	.next { right: 10px; }

	/* Dots */
	.dots {
	  text-align: center;
	  margin-top: 10px;
	}

	.dot {
	  height: 8px;
	  width: 8px;
	  margin: 5px;
	  display: inline-block;
	  background: #ccc;
	  border-radius: 50%;
	  cursor: pointer;
	}

	.active {
	  background: #333;
	}
	
	.map {
  position: relative;
  height: 8`0px;
}

}
