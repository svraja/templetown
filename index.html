<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel AMBI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }


    /* Content */
    .content {
      padding: 2px;
      text-align: center;
    }

    .title {
      margin-top: 40px;
      font-size: 22px;
      font-weight: bold;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 12px;
    }

    /* Bottom Container */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 12px 16px;
      background: transparent;
    }

    /* White rounded card */
    .bottom-card {
      border-radius: 30px;
      padding: 10px;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
    }

    /* Button */
    .continue-btn {
      width: 96%;
      padding: 16px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
	  margin: 10px;
    }

    /* iPhone safe area fix */
    @supports (padding: max(0px)) {
      .bottom-bar {
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
	  
	  .btn-container {
    width: 100%;
    max-width: 500px;
  }

  .continue-btn {
    padding: 10px;
    border-radius: 50px;
    border: none;
    background: #e0e0e0;
    color: #b71c1c;
    font-size: 15px;
    font-weight: bold;
    display: flex;
    gap: 12px;
    box-shadow: 0 6px 0 #b71c1c;
    cursor: pointer;
    transition: 0.2s ease;
	justify-content: center;  /* horizontal center */
	align-items: center;
	
	
  }

  .continue-btn:hover {
    transform: translateY(-2px);
  }

  .continue-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #b71c1c;
  }

  .icon {
    width: 30px;
    height: 30px;
    border: 2px solid black ;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-container {
	margin: 10px;
  justify-content: center;    /* horizontal center */
  align-items: center; 
  border-radius: 30px;
  border: 1px solid rgba(255, 150, 150, 0.4);
	}

  .icon::before {
    content: "➔";
    font-size: 16px;
  }
  .style1  {
    font-size: 16px;
    padding: 15px;
	text-align: center;
	color: white;
  }
  
.hero {
  min-height: 100vh;

  background: 
    linear-gradient(to top, rgba(0,0,0,0.4), transparent),
    url('images/bgimage.png') center/cover no-repeat;

  background-attachment: fixed;
}
  

   }
  </style>
</head>

<body>

<div class="hero">
	    <div class="content">
			<div class="subtitle">  <img src="images/logo.png" alt="Hotel Ambi Logo" style="width: 25%;">  </div>
		</div>
  
  <div>  
	  <div class="card-container">
			<h2 class="style1"> Vanakkam! Welcome to Hotel AMBI </h2>
				<!-- Fixed Bottom Button -->
			<div class="subtitle"> <img src="images/home_img.png" alt="Hotel Ambi Logo" width="100%"></div>	
		<div class="">
			
			<a href="discover.html" class="continue-btn">  Continue <span class="icon"></span>
</a>
		</div>
	  </div>
  </div>
  
  <br>
</div>

</body>
</html>
