  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      padding-top: 80px;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
	  text-align: center;
    }

    .title {
      text-align: center;
      font-size: 16px;
    }

    .distance {
      color: red;
      font-weight: bold;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    .box {
      width: 48%;
      border: 1px solid #ffc4c4;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
	  margin-right: 5px;
	  text-align: left;
    }

    .small {
      font-size: 11px;
      color: #555;
    }
	
	/* Slider */
	.slider {
	  position: relative;
	  width: 90%;
	  margin: 20px auto;
	  overflow: hidden;
	  border-radius: 2px;
	}

	.slides {
	  display: flex;
	  transition: transform 0.5s ease-in-out;
	}

	.slides img {
	  width: 100%;
	  flex-shrink: 0;
	}

	/* Buttons */
	.btn {
	  position: absolute;
	  top: 50%;
	  transform: translateY(-50%);
	  background: rgba(0,0,0,0.5);
	  color: white;
	  border: none;
	  padding: 10px;
	  cursor: pointer;
	  border-radius: 50%;
	}

	.prev { left: 10px; }
	.next { right: 10px; }

	/* Dots */
	.dots {
	  text-align: center;
	  margin-top: 10px;
	}

	.dot {
	  height: 8px;
	  width: 8px;
	  margin: 5px;
	  display: inline-block;
	  background: #ccc;
	  border-radius: 50%;
	  cursor: pointer;
	}

	.active {
	  background: #333;
	}
	
	.map {
  position: relative;
  height: 8`0px;
}

/* Contact Button */
.contact-btn {
  position: absolute;
  right: 15px;
  top: 20px;
  background: white;
  padding: 10px 15px;
  border-radius: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}

/* Home Icon */
.home-icon {
  position: absolute;
  left: 15px;
  top: 20px;
  background: white;
  padding: 10px;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
		.card-link { text-decoration: none; color: inherit; display: block;}


 .slider-box {
      position: relative;
      width: 98%;
      margin-bottom: -20px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      cursor: pointer;
    }

    .left { left: -5px; }
    .right { right: -5px; }

    .left::before {
      content: "";
      display: block;
      width: 10px;
      height: 10px;
      border-left: 3px solid black;
      border-bottom: 3px solid black;
      transform: rotate(45deg);
      margin: auto;
      margin-top: 10px;
    }

    .right::before {
      content: "";
      display: block;
      width: 10px;
      height: 10px;
      border-right: 3px solid black;
      border-top: 3px solid black;
      transform: rotate(45deg);
      margin: auto;
      margin-top: 10px;
    }
	.view-btn {
  display: block;
  margin: 10px auto;
  width: fit-content;
  padding: 10px 10px;
  border-radius: 5px;
  background: #ff0000;
  color: #fff;
  font-size: 12px;
  text-decoration: none;
  font-weight: bold;
  text-align: center;
}

/* Card */
.contact-card {
  max-width: 350px;
  margin: 40px auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Address */
.address {
  font-size: 14px;
  line-height: 1.6;
  color: #333;
  margin-bottom: 15px;
  padding-top: 20px;
}

/* Phone button */
.phone-btn {
  display: inline-block;
  background: #1e1e1e;
  color: #fff;
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Email */
.email {
  font-size: 14px;
  color: #333;
}

.email a {
  color: #000;
  text-decoration: none;
}
		
  </style>

<script>
function move(btn, d){
  let box = btn.parentElement;
  let img = box.querySelector(".slider");

  let images = img.dataset.images.split(",");
  let i = img.dataset.index || 0;

  i = (parseInt(i) + d + images.length) % images.length;

  img.src = images[i];
  img.dataset.index = i;
}
</script>
