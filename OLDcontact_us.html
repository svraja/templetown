	/* Slider */
	.slider {
	  position: relative;
	  width: 90%;
	  margin: 20px auto;
	  overflow: hidden;
	  border-radius: 20px;
	}

	.slides {
	  display: flex;
	  transition: transform 0.5s ease-in-out;
	}

	.slides img {
	  width: 100%;
	  flex-shrink: 0;
	}

	/* Buttons */
	.btn {
	  position: absolute;
	  top: 50%;
	  transform: translateY(-50%);
	  background: rgba(0,0,0,0.5);
	  color: white;
	  border: none;
	  padding: 10px;
	  cursor: pointer;
	  border-radius: 50%;
	}

	.prev { left: 10px; }
	.next { right: 10px; }

	/* Dots */
	.dots {
	  text-align: center;
	  margin-top: 10px;
	}

	.dot {
	  height: 8px;
	  width: 8px;
	  margin: 5px;
	  display: inline-block;
	  background: #ccc;
	  border-radius: 50%;
	  cursor: pointer;
	}

	.active {
	  background: #333;
	}
	/* Map Section */
.map {

  height: 120px;
}
